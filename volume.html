<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Volume</title>

<style>
body {
    background:#0b0b0b;
    color:#e6dccf;
    font-family: Georgia, serif;
    max-width:700px;
    margin:80px auto;
}

h1 {
    text-align:center;
}

.poem {
    margin:30px 0;
}

.poem a {
    color:#c2b280;
    text-decoration:none;
}

.date {
    color:#888;
    font-size:0.9em;
}
</style>
</head>

<body>

<a href="volumes.html">← Back</a>

<h1 id="title"></h1>

<div id="list"></div>

<script>
const params = new URLSearchParams(window.location.search);
const volumeName = params.get("name");

document.getElementById("title").innerText = volumeName;

fetch("poems.json")
  .then(res => res.json())
  .then(poems => {

    const filtered = poems.filter(p => p.volume === volumeName);

    const list = document.getElementById("list");

    if (filtered.length === 0) {
        list.innerHTML = "<p>No poems found.</p>";
        return;
    }

    filtered.forEach(p => {
        list.innerHTML += `
            <div class="poem">
                <a href="poem.html?id=${p.id}">
                    <h3>${p.title}</h3>
                </a>
                <div class="date">${p.date}</div>
            </div>
        `;
    });
});
</script>

</body>
</html>
