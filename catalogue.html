<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Catalogue</title>

<style>
body { background:#0e0e0e; color:#e8e6e3; font-family:Georgia, serif; margin:0; }
header { text-align:center; padding:30px; border-bottom:1px solid #444; }
input {
    padding:10px;
    width:250px;
    margin-top:10px;
    background:#1a1a1a;
    border:1px solid #444;
    color:white;
}
.poem {
    max-width:800px;
    margin:30px auto;
    padding:0 20px;
    border-left:2px solid #c2b280;
}
.date { color:#888; font-size:0.8em; }
a { color:#c2b280; text-decoration:none; }
</style>

</head>

<body>

<header>
    <h1>Catalogue</h1>
    <a href="index.html">← Back Home</a>
    <br><br>
    <input type="date" id="searchDate">
</header>

<div id="results"></div>

<script>
const poems = [
    {
        title: "First Entry",
        date: "2026-03-10",
        content: "Your writing here..."
    },
    {
        title: "Second Entry",
        date: "2026-02-15",
        content: "Another poem..."
    }
];

const resultsDiv = document.getElementById("results");
const searchInput = document.getElementById("searchDate");

function displayPoems(filtered) {
    resultsDiv.innerHTML = "";
    filtered.forEach(p => {
        resultsDiv.innerHTML += `
            <div class="poem">
                <h3>${p.title}</h3>
                <div class="date">${p.date}</div>
                <p>${p.content}</p>
            </div>
        `;
    });
}

displayPoems(poems);

searchInput.addEventListener("input", () => {
    const value = searchInput.value;
    const filtered = poems.filter(p => p.date === value);
    displayPoems(filtered);
});
</script>

</body>
</html>
