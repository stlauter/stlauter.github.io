<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Catalogue</title>

<style>
body {
    margin:0;
    background:#0b0b0b;
    color:#e6dccf;
    font-family: Georgia, serif;
}

.container {
    max-width:900px;
    margin:60px auto;
    padding:40px;
    background:#111;
}

input {
    width:100%;
    padding:10px;
    margin-bottom:20px;
    background:#1a1a1a;
    border:1px solid #444;
    color:white;
}

.poem {
    border-bottom:1px solid #333;
    padding:15px 0;
}

a {
    color:#c2b280;
    text-decoration:none;
}

.date {
    font-size:0.8em;
    color:#888;
}
</style>

</head>

<body>

<div class="container">

<h1>Catalogue</h1>
<a href="index.html">← Back</a>

<br><br>
<input type="date" id="searchDate">

<div id="results"></div>

</div>

<script>
const resultsDiv = document.getElementById("results");

// LOAD JSON
fetch("poems.json")
  .then(res => res.json())
  .then(poems => {

    // sort newest → oldest
    poems.sort((a,b)=> new Date(b.date) - new Date(a.date));

    display(poems);

    document.getElementById("searchDate").addEventListener("input", e => {
        const val = e.target.value;
        display(poems.filter(p => p.date === val));
    });
});

function display(list) {
    resultsDiv.innerHTML = "";
    list.forEach(p => {
        resultsDiv.innerHTML += 
            <div class="poem">
                <a href="poem.html?id=${p.id}">
                    <h3>${p.title}</h3>
                </a>
                <div class="date">${p.date}</div>
            </div>
        ;
    });
}
</script>

</body>
</html>
